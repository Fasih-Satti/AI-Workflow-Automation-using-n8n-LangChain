  schedule:
    - cron: '0 8 * * 3-5,1' # 9am CET (UTC+1), Wednesday - Friday and Monday. (Minor release on tuesday)
jobs:
  schedule-patch-prs:
    permissions:
      contents: write
      pull-requests: write
